# Example configuration for hollowing a PNG voxel stack.
#
# Build and run with:
#   make hollow
#   ./bin/hollow --config hollow/hollow.example.toml

[input]
directory = "/root/voxel/ozark_slices/wb_vaw"

[output]
directory = "/root/voxel/ozark_slices/wb_vaw_hb"

dist_positive_x = 80
dist_negative_x = 80
dist_positive_y = 80
dist_negative_y = 80
dist_positive_z = 80
dist_negative_z = 0

# 45-degree diagonals in the XY, XZ, and YZ planes are also checked.
# Their reach is derived from the paired axis thresholds using Euclidean distance.

colors_for_removal = [
  [255, 255, 255],
  [247, 247, 247, 128],
]

destination_color = [0, 0, 0, 0]
treat_edges_as_blockers = true

[logging]
interval = 1000000
