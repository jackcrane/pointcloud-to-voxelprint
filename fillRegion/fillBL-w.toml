[input]
# Directory containing out_<layer>.png files.
directory = "~/voxel/ozark_slices/wb_vaw_hb_l_p"

[output]
# Directory where the processed PNG stack will be written.
directory = "~/voxel/ozark_slices/wb_vaw_hb_lw_p"

# Fill color as [r, g, b] or [r, g, b, a].
color = [255, 255, 255]

# Optional inclusive layer range. Layers outside this range are copied through unchanged.
[layer]
first = 0
last = 80

# XY mode:
# Omit z to fill the same polygon on every layer.
#
[[points]]
x = 0
y = 0

[[points]]
x = 118
y = 0

[[points]]
x = 651
y = 1751

[[points]]
x = 0
y = 1751
