# Example configuration for filling slice regions.
#
# Build and run with:
#   make fillRegion
#   ./bin/fillRegion --config fillRegion/fillRegion.example.toml

[input]
# Directory containing out_<layer>.png files.
directory = "/media/sf_Voxel_Ubuntu/ozark_slices_0-whitebottom-blackvoid"

[output]
# Directory where the processed PNG stack will be written.
directory = "/media/sf_Voxel_Ubuntu/ozark_slices_0-whitebottom-blackvoid-shaped"

# Fill color as [r, g, b] or [r, g, b, a].
color = [0, 0, 0]

# XY mode:
# Omit z to fill the same polygon on every layer.
#
[[points]]
x = 750
y = 421

[[points]]
x = 639
y = 19

[[points]]
x = 109
y = 0

[[points]]
x = 750
y = 0

# XYZ mode:
# Group points by z layer to define polygon keyframes.
# Every z group must use the same number of points in the same winding order.

# [[points]]
# x = 120.0
# y = 90.0
# z = 10.0

